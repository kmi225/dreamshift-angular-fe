<h1 class="services-main-text slide-in-from-bottom" id="main-services" animateOnVisible>Our Main Services</h1>
<h3 class="services-sub-text slide-in-from-bottom" *ngIf="mode === 'home'" animateOnVisible>(60-Day Interview Guarantee)</h3>

<div class="services-container">
    @for (service of services; track service.id) {
        <div class="service-card" animateOnVisible 
            [ngClass]="{'slide-in-from-left': service.id === 1, 
                'slide-in-from-bottom': service.id === 2, 
                'slide-in-from-right': service.id === 3}" animateOnVisible>
            <div class="service-card-header">
                <i [class]="service.icon" class="service-card-icon"></i>
                <div class="service-card-header-title">
                    <h3>{{ service.title }}</h3>
                </div>
            </div>
            <div class="service-card-content">
                <p><i>"{{ service.subtitle }}"</i></p>
            </div>
            <div class="service-card-content">
                @for (bullet of service.bullets; track bullet) {
                    <i class="fa-solid fa-circle-check fa-sm service-card-bullet-icon"></i>
                    {{ bullet }}
                    <br/>
                }
            </div>
            <div class="service-price">
                <p>{{ service.price }}</p>
            </div>
        </div>
    }
</div>
