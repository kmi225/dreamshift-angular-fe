<div class="ds-input-wrapper" [class.has-icon]="icon()">
  @if (icon(); as iconClasses) {
    <i [ngClass]="iconClasses" class="ds-input-icon" aria-hidden="true"></i>
  }
  <input
    class="ds-input"
    [type]="type()"
    [placeholder]="placeholder()"
    [value]="value()"
    (input)="onInput($event)"
  />
</div>
