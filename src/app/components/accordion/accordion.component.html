<h1 class="slide-in-from-bottom" animateOnVisible>{{ title }}</h1>

<div ngbAccordion #accordion="ngbAccordion" [closeOthers]="true">
  <div *ngFor="let item of accordionItems" class="slide-in-from-bottom" [ngbAccordionItem]="item.id" animateOnVisible>
    <h2 ngbAccordionHeader>
      <button ngbAccordionButton>
        <i class="fa-solid fa-chevron-down"></i>
        <h6>{{ item.title }}</h6>
      </button>
    </h2>
    <div ngbAccordionCollapse>
      <div ngbAccordionBody>
        <ng-template>
          <div [innerHTML]="item.contentHtml"></div>
        </ng-template>
      </div>
    </div>
  </div>
</div>
