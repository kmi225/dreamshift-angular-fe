<div class="footer-container" *ngIf="showFooter">
    <div class="footer-main-content">
        <p class="address-info">
            <strong>DreamShift INC</strong><br/>
            30N Gould St Ste R Sheridan, <br/>
            Wyoming 82801, United States <br/>
            admin&#64;dreamshift.net
        </p>
        <div class="links-container">
            <div class="site-links">
                <a class="text-link" (click)="navigateToPage(routes.HOME)">Home</a>
                <a class="text-link" (click)="navigateToPage(routes.OUR_SERVICES)">Our Services</a>
                <a class="text-link" (click)="navigateToPage(routes.CONTACT)">Contact</a>
                <a class="text-link" (click)="navigateToPage(routes.TERMS_AND_POLICIES)">Terms and Policies</a> 
            </div>
            <div class="sm-icon-container">
                <i class="fa-brands fa-square-linkedin fa-lg ds-clickable-icon" (click)="navigateToSocials('linkedin')"></i>
                <i class="fa-brands fa-instagram fa-lg ds-clickable-icon" (click)="navigateToSocials('instagram')"></i>
                <i class="fa-brands fa-tiktok fa-lg ds-clickable-icon" (click)="navigateToSocials('tiktok')"></i>
                <i class="fa-brands fa-facebook-f fa-lg ds-clickable-icon" (click)="navigateToSocials('facebook')"></i>
            </div>
        </div>
    </div>
    <div class="copyright-banner">
        <div class="copyright-banner-text-container">
            © {{ currentYear }} DreamShift. All rights reserved.
        </div>
    </div>
</div>
