<div class="excel-preview">
  @if (!isBrowser()) {
    <div class="text-center py-4">Loading…</div>
  } @else if (loading()) {
    <div class="text-center py-4">Loading template…</div>
  } @else if (loadError()) {
    <div class="alert alert-warning text-center" role="alert">
      {{ loadError() }}
    </div>
  } @else { 
    <div class="hot-table-container">
      <hot-table [data]="sheetData()" [settings]="gridSettings()" />
    </div>
  }
</div>
