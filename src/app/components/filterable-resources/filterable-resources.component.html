<div class="filterable-resources-section">
  <div class="filter-container">
    <div class="search-row">
      <div class="search-input-wrapper">
        <i class="fa-solid fa-magnifying-glass search-input-icon" aria-hidden="true"></i>
        <input
          class="custom-input-base search-input"
          type="text"
          [placeholder]="searchPlaceholder()"
          [ngModel]="searchQuery()"
          (ngModelChange)="searchQuery.set($event)"
        />
      </div>
    </div>
      <div class="filters-row">
      @for (filter of filters(); track filter.id) {
        <div class="filter-col">
          <ds-dropdown
            [options]="filter.options"
            [label]="filter.label"
            [selected]="getSelectedForFilter(filter.id)"
            (selectedChange)="setSelection(filter.id, $event)"
          />
        </div>
      }
    </div>
  </div>

  <div class="cards-grid-3x3">
    @for (resource of filteredResources(); track resource.link) {
      <article class="card">
        <h4 class="card-title">{{ resource.name }}</h4>
        <div class="card-meta">
          @for (tag of resource.metaTags; track $index) {
            <span class="meta-tag">{{ tag }}</span>
          }
        </div>
        <p class="card-desc">{{ resource.description }}</p>
        <div class="card-divider"></div>
        <div class="card-footer">
          <a class="card-btn" [href]="resource.link" rel="noopener" target="_blank">Explore</a>
        </div>
      </article>
    }
    @if (filteredResources().length === 0) {
      <div class="no-results">{{ noResultsMessage() }}</div>
    }
  </div>
</div>
