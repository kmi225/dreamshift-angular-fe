<div class="page-container contact-us-container">
    <div class="contact-us-title-container">
        <h1 class="large-title">
            Contact Us
        </h1>
        <h6>
            You can WhatsApp us through 
            <a href="https://wa.me/94716936096">
                +94 71 693 6096
            </a>
        </h6>
        <h6>
            or, simply fill the form below.
        </h6>
    </div>

    <div class="contact-us-form-container">
        <form>
            <div class="form-stepper-container">
                <div class="form-stepper-inner-container">
                    @for (field of contactFormFields; track field.step) {
                        <div class="form-stepper-step" 
                            [ngClass]="{
                                'completed-step': currentStep > field.step,
                                'current-step': currentStep === field.step,
                                'future-step': currentStep < field.step,
                            }"
                            (click)="currentStep = field.step">
                            {{ field.step }}
                        </div>
                        <div class="form-stepper-line"
                        [ngClass]="{
                            'completed-step': currentStep > field.step,
                            'future-step': currentStep <= field.step,
                        }"></div>
                    }
                </div>
            </div>
            <div class="form-group">
                    <h5>{{ getCurrentStepFieldName() }}</h5>
                    <textarea class="contact-us-data-input-field" [id]="getCurrentStepFieldId()" [name]="getCurrentStepFieldId() ?? 'contactField'" [placeholder]="getCurrentStepFieldPlaceholder()" [(ngModel)]="currentStepFieldInputValue"></textarea>
            </div>
            <div class="form-navigation-container">
                <div class="form-navigation-inner-container">
                    <button type="button" class="btn ds-primary-btn next-step-btn" (click)="nextStep()" [disabled]="isNextStepDisabled()">
                        @if (currentStep === contactFormFields.length) {
                            Submit
                        } @else {
                            Next
                        }
                    </button>
                    <button type="button" class="btn ds-primary-btn" (click)="previousStep()" *ngIf="currentStep > 1">Previous</button>
    
                </div>
            </div>
        </form>
    </div>
</div>
