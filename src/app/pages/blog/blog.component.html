<div class="page-container">
    <div>
        <h1>Blog</h1>
        <div class="filters-container">
            <div class="search-container">
                <input type="text" placeholder="Search" [(ngModel)]="search" (keyup.enter)="setSearch()" />
                <button type="button" class="btn ds-primary-btn search-btn" (click)="setSearch()">
                    <i class="fa-solid fa-search"></i>
                </button>
            </div>
            <div class="select-container" >
                <label for="category">Select category</label>
                <select id="category" class="form-select" [(ngModel)]="category" (ngModelChange)="setCategory()">
                    <option [value]="undefined"  *ngIf="!loadingCategories">All</option>
                    @for (cat of categoriesList; track cat.id) {
                        <option [value]="cat.slug" *ngIf="!loadingCategories">{{ cat.name }}</option>
                    }
                    <option disabled *ngIf="loadingCategories">Loading categories...</option>
                </select>
             </div>
        </div>    
    </div>
    <div class="blog-posts-container" *ngIf="!loading">
        @for (post of posts; track post.id) {
            <app-blog-post-card [post]="post"></app-blog-post-card>
        }
    </div>
    <div *ngIf="posts.length < totalPosts && !loading && !loadingMorePosts" class="load-more-btn-container">
        <button 
        type="button" 
        class="btn ds-primary-btn load-more-btn" 
        (click)="loadMorePosts()">
            @if (loadingMorePosts) {
                Loading...
            } @else {
                Load More
            }
    </button>
    </div>
    
    <div class="loading-container" *ngIf="loading">
        <i class="fa-solid fa-spinner fa-spin fa-3x"></i>
        <h3>Loading...</h3>
    </div>
</div>
