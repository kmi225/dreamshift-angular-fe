<div class="page-container process-page-container">
    <div>
        <h1 class="slide-in-from-bottom" animateOnVisible>
            Our Unique Process
        </h1>
        <div class="process-video-container">
            <iframe src="https://player.vimeo.com/video/1128317553?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479" 
                frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" 
                referrerpolicy="strict-origin-when-cross-origin" class="process-video" 
                title="Our Process">
            </iframe>
        </div>        
    </div>
    <div>
        <h1>Let us walk you through</h1>
        <h1 class="yellow-title">The Process</h1>
    </div>
    <app-process-walkthrough [processSteps]="processSteps"></app-process-walkthrough>
    <app-accordion [accordionItems]="frequentlyAskedQuestions" [title]="'FAQ'"></app-accordion>
    <app-full-width-banner mode="process"></app-full-width-banner>
</div>
